services:
  grok2api:
    container_name: grok2api
    image: grok2api:local
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.13-alpine AS builder

        ENV PYTHONDONTWRITEBYTECODE=1 \
            PYTHONUNBUFFERED=1 \
            TZ=Asia/Shanghai \
            UV_PROJECT_ENVIRONMENT=/opt/venv

        ENV PATH="$UV_PROJECT_ENVIRONMENT/bin:$PATH"

        RUN apk add --no-cache \
            tzdata \
            ca-certificates \
            build-base \
            linux-headers \
            libffi-dev \
            openssl-dev \
            curl-dev \
            cargo \
            rust

        WORKDIR /app

        COPY --from=ghcr.io/astral-sh/uv:latest /uv /uvx /bin/

        COPY pyproject.toml uv.lock ./

        RUN uv sync --frozen --no-dev --no-install-project \
            && find /opt/venv -type d -name "__pycache__" -prune -exec rm -rf {} + \
            && find /opt/venv -type f -name "*.pyc" -delete \
            && find /opt/venv -type d -name "tests" -prune -exec rm -rf {} + \
            && find /opt/venv -type d -name "test" -prune -exec rm -rf {} + \
            && find /opt/venv -type d -name "testing" -prune -exec rm -rf {} + \
            && find /opt/venv -type f -name "*.so" -exec strip --strip-unneeded {} + || true \
            && rm -rf /root/.cache /tmp/uv-cache

        FROM python:3.13-alpine

        ENV PYTHONDONTWRITEBYTECODE=1 \
            PYTHONUNBUFFERED=1 \
            TZ=Asia/Shanghai \
            VIRTUAL_ENV=/opt/venv

        ENV PATH="$VIRTUAL_ENV/bin:$PATH"

        RUN apk add --no-cache \
            tzdata \
            ca-certificates \
            libffi \
            openssl \
            libgcc \
            libstdc++ \
            libcurl

        WORKDIR /app

        COPY --from=builder /opt/venv /opt/venv

        COPY config.defaults.toml ./
        COPY app ./app
        COPY main.py ./
        COPY scripts ./scripts

        RUN mkdir -p /app/data /app/logs \
            && chmod +x /app/scripts/entrypoint.sh

        EXPOSE 8000

        ENTRYPOINT ["/app/scripts/entrypoint.sh"]

        CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "30015:8000"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: INFO
      SERVER_PORT: 8000
      SERVER_WORKERS: 1
      SERVER_STORAGE_TYPE: local
      # SERVER_STORAGE_URL: 

      # SERVER_STORAGE_TYPE: (local, redis, mysql, pgsql) default: local
      # SERVER_STORAGE_URL: (local mode is empty) default: empty
      #   Redis: redis://localhost:6379/0 or redis://:password@localhost:6379/0
      #   MySQL: mysql+aiomysql://user:pass@localhost/db
      #   PgSQL: postgresql+asyncpg://user:pass@localhost/db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
